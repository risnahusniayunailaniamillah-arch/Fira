<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Fira! 🍵✨</title>
    <style>
        :root {
            --matcha-dark: #556b2f;
            --matcha-latte: #a3b18a;
            --matcha-cream: #dad7cd;
            --white: #f8f9fa;
        }

        body {
            background-color: var(--matcha-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            color: var(--matcha-dark);
        }

        .container {
            text-align: center;
            background: var(--white);
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 380px;
            z-index: 10;
            position: relative;
            border: 2px solid var(--matcha-latte);
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px dashed var(--matcha-dark);
            padding: 5px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .matcha-emoji {
            font-size: 45px;
            position: absolute;
            top: -25px;
            right: 20px;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
        }

        h1 { margin: 10px 0; font-size: 1.6rem; color: var(--matcha-dark); }
        p { font-size: 1rem; line-height: 1.6; min-height: 70px; color: #444; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            background-color: var(--matcha-dark);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(85, 107, 47, 0.3);
        }

        .btn:active { transform: scale(0.95); }

        .music-control {
            background: transparent;
            border: 1.5px solid var(--matcha-dark);
            color: var(--matcha-dark);
            font-size: 0.85rem;
            padding: 8px;
            border-radius: 50px;
            cursor: pointer;
            opacity: 0.8;
        }

        .bubble {
            position: absolute;
            background: var(--matcha-latte);
            border-radius: 50%;
            opacity: 0.4;
            bottom: -50px;
            animation: float 5s infinite ease-in;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="matcha-emoji">🍵</div>
        
        <div class="photo-frame">
    <img id="profilePic" 
         src="https://lh3.googleusercontent.com/d/1Vg802zoYOpgDW6KBjgX5tcD9VID9qtdc" 
         referrerpolicy="no-referrer"
         alt="Fira">
</div>

        <h1 id="title">Halo, Fira! ✨</h1>
        <p id="message">Firaaa ini Risnaa</p>

        <div class="btn-group">
            <button class="btn" onclick="nextMessage()">Buka Pesan 💌</button>
            <button class="music-control" onclick="toggleMusic()" id="musicBtn">Putar Musik 🎵</button>
        </div>
    </div>

    <script>
        let step = 0;
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        
        const messages = [
            "Selamat Ulang Tahun, Fira! 🥳",
            "Semoga di tahun ini, semua rencana kamu lancar jaya.",
            "Happy terus fira, ditunggu kabar kamu suka americano ya. 💚",
            "Kurangi overthink-nya, perbanyak happy-nya.",
            "Stay amazing, Fira! Semoga makin sukses kuliahnya lopeee",
            "Hadiahnya? Nunggu kita ketemu ya buat klaim! WKWK. Happy Birthday! 🎂"
        ];

        function nextMessage() {
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            
            if (step < messages.length) {
                title.innerText = "Spesial Buat Fira";
                message.innerText = messages[step];
                createBubbles();
                step++;
            } else {
                title.innerText = "Udah Selesai!";
                message.innerText = "Sekali lagi, Happy Birthday Fira! Semoga harimu semanis matcha pake gula aren! ✨";
                document.querySelector('.btn').innerText = "Baca Ulang?";
                step = 0;
            }
        }

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => console.log("Perlu interaksi user untuk putar musik"));
                musicBtn.innerText = "Matikan Musik 🔇";
            } else {
                music.pause();
                musicBtn.innerText = "Mulai Musik 🎵";
            }
        }

        function createBubbles() {
            for (let i = 0; i < 6; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 20 + 10 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(bubble);
                setTimeout(() => { bubble.remove(); }, 5000);
            }
        }
    </script>
</body>
</html>
